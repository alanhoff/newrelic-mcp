  These hints help users understand the intended use cases for the macro. A macro may work in clauses not listed here, and there's no guarantee it will work in all listed clauses. The actual validity depends on the expression content and the query context.

  For example, a macro with expression `appName = 'myApp'` might list `[WHERE, LIKE]` as hints, but could potentially be used in other contexts.

  If no hints are provided, users should refer to the expression content to determine appropriate usage.
  """
  clauseHints: [EntityManagementNrqlMacroClause!]
  """
  The NRQL expression that will be substituted when this macro is used in a query.

  This can be any valid NRQL fragment appropriate for the supported clause(s). Examples:
  - WHERE clause: `environment = 'production' AND appName NOT LIKE '%test%'`
  - SELECT clause: `average(duration) / 1000 as 'avgDurationSeconds'`
  - FACET clause: `appName, host`
  """
