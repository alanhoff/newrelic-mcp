  errorsInboxUpdateErrorGroupState(
    "DEPRECATED. Use `ids` field instead."
    id: ID,
    "The ids of the error groups."
    ids: [ID!],
    """
    Allows error group(s) to be marked as `Resolved` prior to deployment.  Configures errors inbox to resolve an error group in the next semantically higher version that is detected via change tracking. Cannot be used with `versions`.

    For example, if an error group is occurring in version `1.5` and marked as `resolvedInNextVersion` = `true`, then the error group will remain in a resolved state for errors with versions `1.5` or lower.
    - When the next version is deployed (say `1.6`), the error group will be updated to reflect as resolved in version `1.6`.
    - If an error occurs in a newer version (say `1.6`) before the next detected deployment, then the error group will be set to unresolved with regression in `1.6`.
    """
    resolveInNextVersion: Boolean,
    "State that the error groups should transition to."
    state: ErrorsInboxErrorGroupState!,
    """
    Optionally specify versions of the entity for which an error group's state applies. Note: this is currently only applicable for `Resolved` and cannot be used with `resolvedInNextVersion`.

    For example, let's say a given error group is occurring for version `1.0.0`.  A fix was implemented and deployed in `1.0.1`.  The error group may be marked as `Resolved` in version `1.0.1`.  For any errors still occurring in `1.0.0` or lower, they will continue to appear as occurrences but the error group will remain in a resolved state.  If there is a new occurrence in `1.0.1` or higher, then the error group will become unresolved with regression in the affected version(s).
    """
    versions: ErrorsInboxStateVersionInput
  ): ErrorsInboxUpdateErrorGroupStateResponse
