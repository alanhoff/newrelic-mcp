"""
The @stream directive allows list fields to be returned incrementally.
The first N items will be delivered immediately, with remaining items
streamed in subsequent responses.
"""
directive @stream(
    "Number of list items to include in the initial response."
    initialCount: Int = 0,
    "A unique label to identify this stream in the response."
    label: String
  ) on FIELD

