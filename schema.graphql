"""
Hints indicating which NRQL clause(s) a macro is intended to be used in.

These values help users understand the intended context for macro substitution, though they are advisory only. The actual suitability of a macro for a given clause depends on its expression content and the specific query context.
"""
enum EntityManagementNrqlMacroClause {
  """
  Macro intended for use anywhere an attribute name or attribute-like expression could appear.

  Example macro expression: `duration - (externalDuration OR 0)`
  Usage: `SELECT percentile($macro, 50, 90, 95) FROM Transaction`
  """
  ATTRIBUTE_LIKE
  """
  Macro intended for use in FACET clauses, which group results by specified attributes.

  Example macro expression for FACET: `appName, host, environment`
  Usage: `SELECT count(*) FROM Transaction FACET $macro`
  """
  FACET
  """
  Macro intended for use with IN operators, which check if a value exists in a list.

  Example macro expression for IN: `('app1', 'app2', 'app3')`
  Usage: `SELECT count(*) FROM Transaction WHERE appName IN $macro`
  """
  IN
  """
  Macro intended for use with LIKE or RLIKE operators, which perform pattern matching.

  Example macro expression for LIKE: `'%error%'` or `'prod-%'`
  Usage: `SELECT count(*) FROM Transaction WHERE appName LIKE $macro`
  """
  LIKE
  """
  Macro intended for use in SELECT clauses, which specify what data to return.

  Example macro expression for SELECT: `average(duration), max(duration), min(duration)`
  Usage: `SELECT $macro FROM Transaction`
  """
  SELECT
  """
  Macro intended for use in WHERE clauses, which filter data based on conditions.

  Example macro expression for WHERE: `environment = 'production' AND appName NOT LIKE '%test%'`
  Usage: `SELECT count(*) FROM Transaction WHERE $macro`
  """
  WHERE
  """
  Macro intended for use in WITH clauses, which define NRQL variables and store values that can be referenced anywhere in the query.

  Example macro expression for WITH: `appName OR app_name`
  Usage: `FROM Transaction WITH $macro AS app SELECT uniqueCount(app)`
  """
  WITH
}
